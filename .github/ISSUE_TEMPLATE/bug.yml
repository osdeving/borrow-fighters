name: Bug / comportamento estranho
description: Registre um problema observavel. Mais util quando houver prototipo jogavel.
title: "[Bug]: "
labels: ["type: bug", "status: triage"]
body:
  - type: textarea
    id: observed
    attributes:
      label: O que aconteceu?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: O que era esperado?
  - type: textarea
    id: steps
    attributes:
      label: Passos para reproduzir
      placeholder: |
        1.
        2.
        3.
  - type: textarea
    id: environment
    attributes:
      label: Ambiente
      description: Sistema operacional, versao, branch, build ou contexto.
  - type: textarea
    id: evidence
    attributes:
      label: Evidencias
      description: Prints, videos, logs ou observacoes.
